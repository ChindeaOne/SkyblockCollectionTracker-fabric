name: modrinth_publish.yml
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        game-version: ["26.1", "26.2"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download ${{ github.event.release.tag_name }} --pattern "*${{ matrix.game-version }}*.jar" --dir release-assets

      - name: Prepare Description
        id: prepare_desc
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          echo "$RELEASE_BODY" > body.txt
          sed -i '/^\*\*Full Changelog\*\*/d' body.txt
          {
            echo 'description<<EOF'
            cat body.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: iYI2Iw6k
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-unfeature-mode: none

          version-type: ${{ github.event.release.prerelease && 'beta' || 'release' }}
          name: "${{ github.event.release.name }}"
          version: "${{ github.event.release.tag_name }}"
          changelog: "${{ steps.prepare_desc.outputs.description }}"

          files: |
            release-assets/**/*${{ matrix.game-version }}*.jar
            !release-assets/**/*-dev.jar
            !release-assets/**/*-sources.jar
            !release-assets/**/*-javadoc.jar

          loaders: fabric
          game-versions: ${{ matrix.game-version }}

          dependencies: |
            P7dR8mSH (required)
            Ha28R6CL (required)